version: 2
models:

  - name: stg_raw_customers
    description: "Cleaned customers staging table"
    columns:
         - name: user_id
           tests:
              - not_null
              - unique              
         - name: email
           tests:
              - not_null  
         - name: full_name 
           tests:
              - not_null  
         - name: status 
           tests:
              - not_null  
         - name: gender
           tests:
              - not_null  
         - name: birth_date
           tests:
              - not_null  
         - name: region
           tests:
              - not_null  
         - name: city 
           tests:
              - not_null  
         - name: town
           tests:
              - not_null  
         - name: district 
           tests:
              - not_null  
         - name: address       
           tests:
              - not_null              