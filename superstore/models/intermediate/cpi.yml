version: 2

models:
  - name: int_cpi_monthly
    description: "Monthly CPI metrics and January 2021 constant-TRY adjustment factors at one row per CPI month."
    columns:
      - name: cpi_month
        description: "First day of the CPI observation month."
        tests:
          - not_null
          - unique

      - name: cpi_index_2003_100
        description: "Consumer price index level from TCMB EVDS with the source 2003=100 baseline."
        tests:
          - not_null

      - name: source_series_code
        description: "TCMB EVDS series code used to fetch the CPI observation."
        tests:
          - not_null

      - name: cpi_mom_rate
        description: "Month-over-month CPI change derived from monthly CPI index levels."

      - name: cpi_yoy_rate
        description: "Year-over-year CPI change derived from monthly CPI index levels."

      - name: real_revenue_base_month
        description: "Constant-TRY reporting month used for CPI-adjusted revenue."
        tests:
          - not_null

      - name: base_cpi_index_2003_100
        description: "CPI index level for the January 2021 real revenue base month."
        tests:
          - not_null

      - name: inflation_adjustment_factor
        description: "Multiplier that converts nominal TRY for the CPI month into January 2021 TRY."
        tests:
          - not_null

      - name: cpi_index_jan_2021_100
        description: "Cumulative CPI price-level index normalized so January 2021 equals 100."
        tests:
          - not_null
