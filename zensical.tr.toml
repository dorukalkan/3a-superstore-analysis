[project]
site_name = "3A Superstore Analizi"
site_description = "3A Superstore veri seti üzerine uçtan uca bir veri analitiği projesi."
site_author = "Doruk Alkan"
docs_dir = "docs-tr"
site_dir = "site/tr"
repo_url = "https://github.com/dorukalkan/3a-superstore-analysis"
repo_name = "3a-superstore-analysis"
extra_css = ["stylesheets/extra.css"]

nav = [
  "index.md",
  { "Analizler" = [
    "analizler/gelir-performansi-enflasyon.md",
    "analizler/satis-gelir-icgoruleri.md",
    "analizler/musteri-buyume-firsatlari.md",
    "analizler/musteri-sagligi.md",
    "analizler/musteri-elde-tutma-rfm.md",
    "analizler/bolge-kategori-performansi.md",
    "analizler/kategori-trendleri.md",
  ] },
  { "dbt Modelleri" = [
    "modeller/staging.md",
    "modeller/intermediate.md",
    "modeller/marts.md",
  ] },
  { "Hakkında" = [
    "hakkinda/veri-seti.md",
    "hakkinda/ekip.md",
  ] },
]

[project.extra]
alternate = [
  { name = "English", link = "/", lang = "en" },
  { name = "Türkçe", link = "/tr/", lang = "tr" },
]

[project.theme]
language = "tr"
custom_dir = "overrides"
features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Koyu moda geç"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Aydınlık moda geç"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.blocks.caption]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]

[project.markdown_extensions.zensical.extensions.glightbox]
auto_caption = true
